version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ddjqr_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: dingtalk_daily_reports
    volumes:
      - mongodb_data:/data/db
    networks:
      - ddjqr_network

volumes:
  mongodb_data:

networks:
  ddjqr_network:
    driver: bridge
